# Render Blueprint — https://render.com/docs/blueprint-spec
# MongoDB Atlas (MONGODB_URI). Kafka en la nube vía Confluent Cloud (KAFKA_BROKER + API key/secret).
services:
  - type: web
    name: iot-platform-backend
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: KAFKA_BROKER
        sync: false
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false
      - key: KAFKA_SASL_MECHANISM
        sync: false
      - key: ANALYTICS_EVENTS_URL
        value: https://analisis-proyecto-ti.onrender.com/v1/events
      - key: ANALYTICS_EVENTS_ENABLED
        value: "true"
      - key: SIMULATION_API_KEY
        generateValue: true
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: SIMULATION_AUTO_START
        value: "true"
      - key: SIMULATION_AUTO_SENSOR_COUNT
        value: "4"
      - key: SIMULATION_AUTO_FREQUENCY_MS
        value: "10000"
      - key: INCIDENTS_ALERTS_URL
        value: https://proyecto11-mochicode.onrender.com/api/v1/alertas
      - key: INCIDENTS_API_KEY
        sync: false
      - key: INCIDENTS_JWT_TOKEN
        sync: false
      - key: INCIDENTS_SYSTEM_ID
        value: P08
      - key: INCIDENTS_MIN_SEVERITY
        value: warning
      - key: INCIDENTS_ALERTS_ENABLED
        value: "true"
