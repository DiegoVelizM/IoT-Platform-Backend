services:
  backend:
    build: .
    container_name: iot_backend
    ports:
      - "3000:3000"
    environment:
      PORT: ${PORT:-3000}
      API_KEY: ${API_KEY:?API_KEY is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongo:27017/sensores_db?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: sensores_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
    expose:
      - "27017"
    volumes:
      - sensores_mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "-u",
          "${MONGO_ROOT_USERNAME}",
          "-p",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sensores_mongo_data:
